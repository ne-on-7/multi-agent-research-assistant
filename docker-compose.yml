version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
